{% extends "base.html" %}

{% block content %}

<h2>Edit Product</h2>

<form method="POST">
    <label>Name:</label><br>
    <input type="text" name="name" value="{{ product[1] }}"><br><br>

    <label>Price:</label><br>
    <input type="number" name="price" value="{{ product[2] }}"><br><br>

    <label>Description:</label><br>
    <textarea name="description">{{ product[3] }}</textarea><br><br>

    <button type="submit">Update Product</button>
</form>

{% endblock %}
