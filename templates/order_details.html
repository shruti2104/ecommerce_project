{% extends "base.html" %}

{% block content %}

<div class="order-container">

    <h2 class="page-title">Order #{{ order.id }}</h2>

    <div class="order-card">
        <table class="order-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Subtotal</th>
                </tr>
            </thead>

            <tbody>
                {% for item in products %}
                <tr>
                    <td>{{ item.name }}</td>
                    <td>₹ {{ item.order_price }}</td>
                    <td>{{ item.quantity }}</td>
                    <td>₹ {{ item.subtotal }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div class="order-total">
            <span>Total</span>
            <span>₹ {{ total }}</span>
        </div>
    </div>

</div>

{% endblock %}
