<!DOCTYPE html>
<html>
<head>
    <title>My E-Commerce Store</title>
</head>
<body>

<h1>My Store</h1>

<nav>
    <a href="/">Home</a> |
    <a href="/products">Products</a> |
    <a href="/cart">Cart</a> |
    <a href="/orders">Orders</a> |
    {% if session.get('user_id') %}
        Hello, {{ session.get('user_name') }} |
        <a href="/logout">Logout</a>
    {% else %}
        <a href="/login">Login</a> |
        <a href="/register">Register</a>
    {% endif %}
</nav>

<hr>

{% block content %}
{% endblock %}

<hr>

<footer>
    <p>My Store © 2026</p>
</footer>

</body>
</html>
