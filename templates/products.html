{% extends "base.html" %}
{% block content %}

<h2 class="page-title">Products</h2>

<div class="products-grid">
    {% for product in products %}

        <!-- Entire card clickable -->
        <a href="/product/{{ product[0] }}" class="product-link">
            <div class="product-card">

                <!-- Image -->
                <div class="product-image">
                    <img src="{{ product[4] if product|length > 4 else url_for('static', filename='images/no-image.png') }}">
                </div>

                <!-- Details -->
                <div class="product-details">
                    <h3 class="product-title">{{ product[1] }}</h3>

                    <div class="rating">
                        ⭐⭐⭐⭐☆
                        <span>(120)</span>
                    </div>

                    <div class="price-section">
                        <span class="current-price">$ {{ product[2] }}</span>
                        <span class="old-price">$ {{ product[2] + 20 }}</span>
                    </div>

                    <p class="desc">{{ product[3][:60] }}...</p>

                    <!-- Only Add to Cart -->
                    <form action="/add-to-cart/{{ product[0] }}" method="POST">
					    <button type="submit" class="cart-btn">Add to Cart</button>
					</form>

                </div>

            </div>
        </a>

    {% endfor %}
</div>

{% endblock %}
