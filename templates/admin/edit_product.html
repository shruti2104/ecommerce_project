{% extends "admin/admin_base.html" %}

{% block admin_content %}

<div class="admin-form-card">

    <h2 class="admin-title">Edit Product</h2>

    <form method="POST" class="admin-form">

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{ product[1] }}">
        </div>

        <div class="form-group">
            <label>Price</label>
            <input type="number" name="price" value="{{ product[2] }}">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description">{{ product[3] }}</textarea>
        </div>

        <button type="submit" class="admin-btn">Update Product</button>

    </form>

</div>

{% endblock %}
