{% extends "base.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">

<div class="admin-container">

    <h2 class="admin-title">Products</h2>

    <div class="table-container">
        <table class="admin-table">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                {% for p in products %}
                <tr>
                    <td>{{ p.id }}</td>
                    <td>{{ p.name }}</td>
                    <td>₹{{ p.price }}</td>
                    <td>
                        <a href="/admin/edit-product/{{ p.id }}" class="btn-edit">Edit</a>
                        <a href="/admin/delete-product/{{ p.id }}" class="btn-delete">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

{% endblock %}
